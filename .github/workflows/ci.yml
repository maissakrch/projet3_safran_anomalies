name: CI — Safran Anomaly Detection

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Installation Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Entraînement du modèle
        run: |
          python src/train_model.py

      - name: Prédiction batch
        run: |
          python src/predict.py

      - name: Exécution des tests automatisés
        run: |
          pytest src/tests/test_model.py -v --tb=short

      - name: Rapport de couverture
        run: |
          pip install pytest-cov
          pytest src/tests/test_model.py --cov=src --cov-report=term-missing