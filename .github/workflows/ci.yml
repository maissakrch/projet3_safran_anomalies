name: CI — Safran Anomaly Detection

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Installation Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Entraînement du modèle
        run: |
          python src/train_model.py

      - name: Prédiction batch
        run: |
          python src/predict.py

      - name: Exécution des tests automatisés
        run: |
          pytest src/tests/ -v --tb=short

      - name: Rapport de couverture
        run: |
          pip install pytest-cov
          pytest src/tests/ --cov=src --cov-report=term-missing

      - name: Génération du rapport d'évaluation
        run: |
          python src/generate_report.py

      - name: Publication du rapport d'évaluation (artefact)
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: evaluation_report.md

      - name: Packaging — build de l'image Docker
        run: |
          docker build -t safran-anomaly-api .